<!DOCTYPE html>
<html>
<head>
    <title>Action Cheeti Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">🏦 Action Cheeti Dashboard</h2>

    <!-- DASHBOARD CARDS -->
    <div class="row text-center">

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>Total Members</h5>
                <h3 id="totalMembers">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>Paid Members</h5>
                <h3 id="paidMembers">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>Total Bids</h5>
                <h3 id="totalBids">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>Winners</h5>
                <h3 id="winners">0</h3>
            </div>
        </div>

    </div>

    <hr>

    <!-- ACTIONS -->
    <div class="row mt-4">

        <div class="col-md-4">
            <h5>Add Member</h5>
            <input id="userId" class="form-control mb-2" placeholder="User ID">
            <input id="cheetiId" class="form-control mb-2" placeholder="Cheeti ID">
            <input id="month" class="form-control mb-2" placeholder="Month">
            <button class="btn btn-primary" onclick="addMember()">Add</button>
        </div>

        <div class="col-md-4">
            <h5>Pay</h5>
            <input id="payId" class="form-control mb-2" placeholder="Member ID">
            <button class="btn btn-success" onclick="pay()">Pay</button>
        </div>

        <div class="col-md-4">
            <h5>Bid</h5>
            <input id="bidId" class="form-control mb-2" placeholder="Member ID">
            <input id="amount" class="form-control mb-2" placeholder="Amount">
            <button class="btn btn-warning" onclick="bid()">Bid</button>
        </div>

    </div>

    <div class="mt-4">
        <h5>Select Winner</h5>
        <input id="winnerId" class="form-control mb-2" placeholder="Cheeti ID">
        <button class="btn btn-danger" onclick="winner()">Select Winner</button>
    </div>

    <div class="mt-4">
        <button class="btn btn-dark" onclick="loadDashboard()">Refresh Dashboard</button>
    </div>

    <hr>

    <!-- OUTPUT -->
    <h5>Output</h5>
    <pre id="output"></pre>

</div>

<script>

const baseUrl = "http://localhost:8075/cheeti-member";

function showOutput(data) {
    document.getElementById("output").innerText =
        typeof data === "string" ? data : JSON.stringify(data, null, 2);
}

// ADD MEMBER
function addMember() {
    fetch(baseUrl, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            userId: userId.value,
            cheetiId: cheetiId.value,
            month: month.value
        })
    })
    .then(res => res.json())
    .then(data => showOutput(data));
}

// PAY
function pay() {
    fetch(`${baseUrl}/pay/${payId.value}`, {method:"PUT"})
    .then(res => res.json())
    .then(data => showOutput(data));
}

// BID
function bid() {
    fetch(`${baseUrl}/bid/${bidId.value}?amount=${amount.value}`, {method:"PUT"})
    .then(res => res.json())
    .then(data => showOutput(data));
}

// WINNER
function winner() {
    fetch(`${baseUrl}/winner/${winnerId.value}`)
    .then(res => res.text())
    .then(data => showOutput(data));
}

// DASHBOARD
function loadDashboard() {
    fetch(`${baseUrl}/dashboard`)
    .then(res => res.text())
    .then(data => {
        showOutput(data);

        // parse values
        let lines = data.split("\n");

        totalMembers.innerText = lines[0].split(": ")[1];
        paidMembers.innerText = lines[1].split(": ")[1];
        totalBids.innerText = lines[2].split(": ")[1];
        winners.innerText = lines[3].split(": ")[1];
    });
}

</script>

</body>
</html>
